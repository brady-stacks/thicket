<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thicket - Clarity Cost Analysis</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #002b36; /* Solarized base03 */
            color: #839496; /* Solarized base0 */
            line-height: 1.6;
        }
        .container {
            background: #073642; /* Solarized base02 */
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #b58900; /* Solarized yellow */
            margin-top: 0;
            margin-bottom: 5px;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
        }
        h3 {
            color: #93a1a1; /* Solarized base1 */
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: normal;
            font-style: italic;
        }
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
        }
        .recent-searches-dropdown {
            position: absolute;
            top: 100%;
            left: 100px;
            right: 0;
            margin-top: 5px;
            background: #073642; /* Solarized base02 */
            border: 1px solid #586e75; /* Solarized base01 */
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .recent-searches-dropdown.show {
            display: block;
        }
        .recent-search-item {
            padding: 10px 15px;
            border-bottom: 1px solid #586e75; /* Solarized base01 */
            cursor: pointer;
            color: #839496; /* Solarized base0 */
            font-size: 13px;
        }
        .recent-search-item:last-child {
            border-bottom: none;
        }
        .recent-search-item:hover {
            background: #002b36; /* Solarized base03 */
        }
        .recent-search-item-url {
            color: #268bd2; /* Solarized blue */
            word-break: break-all;
        }
        .recent-search-item-source {
            color: #93a1a1; /* Solarized base1 */
            white-space: pre;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
            font-size: 12px;
            max-height: 60px;
            overflow: hidden;
        }
        #inputTypeSelect {
            padding: 12px;
            font-size: 14px;
            border: 2px solid #586e75; /* Solarized base01 */
            border-radius: 4px;
            background-color: #002b36; /* Solarized base03 */
            color: #839496; /* Solarized base0 */
            font-family: inherit;
            cursor: pointer;
            min-width: 100px;
        }
        #inputTypeSelect:focus {
            outline: none;
            border-color: #268bd2; /* Solarized blue */
        }
        #urlInput, #sourceInput {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #586e75; /* Solarized base01 */
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #002b36; /* Solarized base03 */
            color: #839496; /* Solarized base0 */
            font-family: inherit;
        }
        #sourceInput {
            min-height: 200px;
            resize: vertical;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        #urlInput:focus, #sourceInput:focus {
            outline: none;
            border-color: #268bd2; /* Solarized blue */
        }
        #sourceInput {
            display: none;
        }
        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .content-wrapper.cost-map-hidden {
            grid-template-columns: 1fr;
        }
        @media (max-width: 1200px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }
        .source-section, .cost-section {
            background: #002b36; /* Solarized base03 */
            border-radius: 4px;
            padding: 15px;
            border: 1px solid #586e75; /* Solarized base01 */
        }
        .cost-section {
            position: relative;
        }
        .cost-section.hidden {
            display: none;
        }
        .content-wrapper {
            position: relative;
        }
        .cost-map-toggle {
            position: absolute;
            top: 15px;
            right: -30px;
            width: 30px;
            height: 30px;
            background: #073642; /* Solarized base02 */
            border: 1px solid #586e75; /* Solarized base01 */
            border-left: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #859900; /* Solarized green */
            font-size: 14px;
            user-select: none;
            z-index: 10;
        }
        .content-wrapper.cost-map-hidden .cost-map-toggle {
            right: -30px;
        }
        .cost-map-toggle:hover {
            background: #002b36; /* Solarized base03 */
        }
        .cost-map-toggle::before {
            content: '◀';
        }
        .content-wrapper.cost-map-hidden .cost-map-toggle::before {
            content: '▶';
        }
        .section-title {
            color: #859900; /* Solarized green */
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
        }
        #sourceCode {
            white-space: pre;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
            padding: 15px;
            background: #002b36; /* Solarized base03 */
            border-radius: 4px;
            margin: 0;
            color: #839496; /* Solarized base0 */
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
        }
        #sourceCode .hoverable {
            cursor: help;
            position: relative;
            color: #b58900; /* Solarized yellow/orange - same as header */
            font-weight: 500;
        }
        #sourceCode .hoverable:hover {
            background-color: #073642; /* Solarized base02 */
        }
        .tooltip {
            position: absolute;
            background: #073642; /* Solarized base02 */
            border: 1px solid #586e75; /* Solarized base01 */
            border-radius: 4px;
            padding: 10px;
            z-index: 1000;
            min-width: 200px;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            font-size: 12px;
            color: #839496; /* Solarized base0 */
            pointer-events: none;
        }
        .tooltip .tooltip-title {
            color: #859900; /* Solarized green */
            font-weight: bold;
            margin-bottom: 5px;
        }
        .tooltip .cost-item {
            margin: 3px 0;
        }
        .tooltip .cost-label {
            color: #93a1a1; /* Solarized base1 */
        }
        .tooltip .cost-value {
            color: #268bd2; /* Solarized blue */
        }
        #costTree {
            padding: 15px;
            background: #002b36; /* Solarized base03 */
            border-radius: 4px;
            font-size: 12px;
            white-space: pre-wrap;
            font-family: inherit;
        }
        .loading {
            color: #586e75; /* Solarized base01 */
            font-style: italic;
        }
        .error {
            color: #dc322f; /* Solarized red */
            background-color: #073642; /* Solarized base02 */
            border-color: #dc322f; /* Solarized red */
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .result {
            margin-top: 20px;
        }
        .top-functions {
            margin-bottom: 20px;
        }
        .top-functions-header {
            background: #002b36; /* Solarized base03 */
            border: 1px solid #586e75; /* Solarized base01 */
            border-radius: 4px;
            padding: 10px 15px;
            cursor: pointer;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #859900; /* Solarized green */
            font-weight: bold;
        }
        .top-functions-header-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .top-functions-focus-select {
            background: #073642; /* Solarized base02 */
            border: 1px solid #586e75; /* Solarized base01 */
            border-radius: 3px;
            padding: 4px 8px;
            color: #839496; /* Solarized base0 */
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .top-functions-focus-select:hover {
            background: #002b36; /* Solarized base03 */
        }
        .top-functions-focus-select:focus {
            border-color: #268bd2; /* Solarized blue */
        }
        .top-functions-header:hover {
            background: #073642; /* Solarized base02 */
        }
        .top-functions-header::after {
            content: '▼';
            font-size: 12px;
            transition: transform 0.2s;
        }
        .top-functions-header.collapsed::after {
            transform: rotate(-90deg);
        }
        .top-functions-table {
            background: #002b36; /* Solarized base03 */
            border: 1px solid #586e75; /* Solarized base01 */
            border-top: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
        }
        .top-functions-table.collapsed {
            display: none;
        }
        .top-functions-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .top-functions-table th {
            background: #073642; /* Solarized base02 */
            color: #859900; /* Solarized green */
            padding: 10px;
            text-align: left;
            font-weight: bold;
            border-bottom: 1px solid #586e75; /* Solarized base01 */
        }
        .top-functions-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #586e75; /* Solarized base01 */
            color: #839496; /* Solarized base0 */
        }
        .top-functions-table tr:last-child td {
            border-bottom: none;
        }
        .top-functions-table tr:hover {
            background: #073642; /* Solarized base02 */
        }
        .top-functions-table .function-name {
            color: #b58900; /* Solarized yellow */
            font-weight: 500;
        }
        .top-functions-table .function-name a {
            color: #b58900; /* Solarized yellow */
            text-decoration: none;
            cursor: pointer;
        }
        .top-functions-table .function-name a:hover {
            text-decoration: underline;
            color: #d33682; /* Solarized magenta */
        }
        .top-functions-table .runtime-value {
            color: #268bd2; /* Solarized blue */
            text-align: right;
        }
        #sourceCode .function-anchor {
            scroll-margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thicket</h1>
        <h3>Clarity Static Cost Analysis</h3>
        <p id="inputDescription" style="color: #93a1a1;">Paste a contract URL to analyze the static cost</p>
        <div class="input-container">
            <select id="inputTypeSelect">
                <option value="url">URL</option>
                <option value="source">Source</option>
            </select>
            <input
                type="text"
                id="urlInput"
                placeholder="https://explorer.hiro.so/txid/SP3YBY0BH4ANC0Q35QB6PD163F943FVFVDFM1SH7S.gl-api?chain=mainnet&tab=sourceCode"
            />
            <textarea
                id="sourceInput"
                placeholder="Paste Clarity source code here..."
            ></textarea>
            <div id="recentSearchesDropdown" class="recent-searches-dropdown"></div>
        </div>
        <div id="result"></div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const sourceInput = document.getElementById('sourceInput');
        const inputTypeSelect = document.getElementById('inputTypeSelect');
        const resultDiv = document.getElementById('result');
        const recentSearchesDropdown = document.getElementById('recentSearchesDropdown');
        let lastPostedUrl = '';
        let lastPostedSource = '';
        let costTreeData = {};
        let currentCostMap = {};
        let selectedFocusAttribute = 'runtime';

        // Handle input type change
        const inputDescription = document.getElementById('inputDescription');
        inputTypeSelect.addEventListener('change', (e) => {
            const inputType = e.target.value;
            if (inputType === 'source') {
                urlInput.style.display = 'none';
                sourceInput.style.display = 'block';
                inputDescription.textContent = 'Paste your contract source to analyze the static cost';
            } else {
                urlInput.style.display = 'block';
                sourceInput.style.display = 'none';
                inputDescription.textContent = 'Paste a mainnet contract URL or source code to analyze the static cost:';
            }
            hideRecentSearches();
        });

        // Show/hide recent searches dropdown
        function showRecentSearches() {
            recentSearchesDropdown.classList.add('show');
        }

        function hideRecentSearches() {
            recentSearchesDropdown.classList.remove('show');
        }

        // Fetch and display recent URLs
        async function loadRecentUrls() {
            try {
                const response = await fetch('/recent-urls');
                if (!response.ok) return;
                const data = await response.json();
                const urls = data.urls || [];

                if (urls.length === 0) {
                    recentSearchesDropdown.innerHTML = '<div class="recent-search-item" style="cursor: default; color: #586e75;">No recent URLs</div>';
                    showRecentSearches();
                    return;
                }

                recentSearchesDropdown.innerHTML = urls.map(url =>
                    `<div class="recent-search-item" data-url="${escapeHtml(url)}">
                        <div class="recent-search-item-url">${escapeHtml(url)}</div>
                    </div>`
                ).join('');

                // Add click handlers
                recentSearchesDropdown.querySelectorAll('.recent-search-item').forEach(item => {
                    const url = item.getAttribute('data-url');
                    if (url) {
                        item.addEventListener('click', () => {
                            urlInput.value = url;
                            hideRecentSearches();
                            processUrlInput();
                        });
                    }
                });

                showRecentSearches();
            } catch (error) {
                console.error('Error loading recent URLs:', error);
            }
        }

        // Fetch and display recent sources
        async function loadRecentSources() {
            try {
                const response = await fetch('/recent-sources');
                if (!response.ok) return;
                const data = await response.json();
                const sources = data.sources || [];

                if (sources.length === 0) {
                    recentSearchesDropdown.innerHTML = '<div class="recent-search-item" style="cursor: default; color: #586e75;">No recent sources</div>';
                    showRecentSearches();
                    return;
                }

                recentSearchesDropdown.innerHTML = sources.map(source =>
                    `<div class="recent-search-item" data-key="${escapeHtml(source.key)}">
                        <div class="recent-search-item-source">${escapeHtml(source.preview)}</div>
                    </div>`
                ).join('');

                // Add click handlers
                recentSearchesDropdown.querySelectorAll('.recent-search-item').forEach(item => {
                    const key = item.getAttribute('data-key');
                    if (key) {
                        item.addEventListener('click', async () => {
                            try {
                                const response = await fetch('/source-by-key', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                    },
                                    body: JSON.stringify({ key: key })
                                });
                                if (response.ok) {
                                    const data = await response.json();
                                    sourceInput.value = data.source_code;
                                    hideRecentSearches();
                                    processSourceInput();
                                }
                            } catch (error) {
                                console.error('Error loading source:', error);
                            }
                        });
                    }
                });

                showRecentSearches();
            } catch (error) {
                console.error('Error loading recent sources:', error);
            }
        }

        // Show recent searches when clicking on input
        urlInput.addEventListener('focus', () => {
            if (inputTypeSelect.value === 'url') {
                loadRecentUrls();
            }
        });

        sourceInput.addEventListener('focus', () => {
            if (inputTypeSelect.value === 'source') {
                loadRecentSources();
            }
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-container')) {
                hideRecentSearches();
            }
        });

        function renderSourceCode(sourceCode, costMap) {
            costTreeData = costMap;
            // Plain text with no syntax highlighting
            let html = escapeHtml(sourceCode);

            // Create hoverable spans for function names
            const functionNames = Object.keys(costMap);
            const escapedFuncNames = functionNames.map(name => name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));

            functionNames.forEach((funcName, funcIdx) => {
                const escapedName = escapedFuncNames[funcIdx];
                const anchorId = `func-${funcName.replace(/[^a-zA-Z0-9]/g, '-')}`;
                let anchorAdded = false;

                // Find all function name occurrences - only match when preceded by opening parenthesis
                const funcRegex = new RegExp(`\\(${escapedName}\\b`, 'g');
                const allMatches = [];

                // Collect all matches
                let match;
                while ((match = funcRegex.exec(html)) !== null) {
                    // Match includes the opening paren, but we only want to highlight the function name
                    // So adjust index to skip the paren and length to exclude it
                    allMatches.push({
                        index: match.index + 1, // Skip the opening paren
                        length: match[0].length - 1, // Exclude the opening paren
                        text: match[0].substring(1) // Function name without the paren
                    });
                }

                // Check which matches are function definitions by looking backwards
                // Clarity: (define-public (func-name, (define-private (func-name, (define-read-only (func-name
                const defMatches = new Set();
                allMatches.forEach(m => {
                    const beforeMatch = html.substring(Math.max(0, m.index - 30), m.index);
                    // Check if this is a function definition - pattern should end with opening paren before function name
                    // Match: (define-public ( or (define-private ( or (define-read-only (
                    if (/\(define-(public|private|read-only)\s+\($/.test(beforeMatch)) {
                        defMatches.add(m.index);
                    }
                });

                // Process matches in reverse order to preserve indices
                for (let i = allMatches.length - 1; i >= 0; i--) {
                    const match = allMatches[i];
                    const isDefinition = defMatches.has(match.index);
                    const costData = costMap[funcName];
                    const costJson = JSON.stringify(costData, null, 2);

                    let replacement = `<span class="hoverable" data-cost='${escapeHtml(costJson)}'>${match.text}</span>`;

                    // Add anchor before function definition (only once, for the first definition found)
                    if (isDefinition && !anchorAdded) {
                        replacement = `<span id="${anchorId}" class="function-anchor"></span>${replacement}`;
                        anchorAdded = true;
                    }

                    html = html.substring(0, match.index) + replacement + html.substring(match.index + match.length);
                }
            });

            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function formatRange(min, max) {
            const formattedMin = formatNumber(min);
            const formattedMax = formatNumber(max);
            if (min === max) {
                return formattedMin;
            }
            return `${formattedMin} - ${formattedMax}`;
        }

        function getAttributeLabel(attribute) {
            const labels = {
                'runtime': 'Runtime',
                'read_count': 'Read Count',
                'read_length': 'Read Length',
                'write_count': 'Write Count',
                'write_length': 'Write Length'
            };
            return labels[attribute] || attribute;
        }

        function getTop5FunctionsByAttribute(costMap, attribute = 'runtime') {
            const functions = Object.keys(costMap)
                .map(funcName => {
                    const cost = costMap[funcName];
                    if (cost && cost.cost && cost.cost.max && cost.cost.max[attribute] !== undefined) {
                        return {
                            name: funcName,
                            value: cost.cost.max[attribute],
                            attribute: attribute
                        };
                    }
                    return null;
                })
                .filter(f => f !== null)
                .sort((a, b) => b.value - a.value)
                .slice(0, 5);

            return functions;
        }

        function renderTopFunctionsTable(costMap, selectedAttribute = 'runtime') {
            const topFunctions = getTop5FunctionsByAttribute(costMap, selectedAttribute);

            if (topFunctions.length === 0) {
                return '';
            }

            const attributeLabel = getAttributeLabel(selectedAttribute);
            const attributes = ['runtime', 'read_count', 'read_length', 'write_count', 'write_length'];

            let tableHtml = '<div class="top-functions">';
            tableHtml += '<div class="top-functions-header">';
            tableHtml += '<div class="top-functions-header-content">';
            tableHtml += '<span>Hungry Functions</span>';
            tableHtml += '<select class="top-functions-focus-select" id="focusAttributeSelect">';
            attributes.forEach(attr => {
                const selected = attr === selectedAttribute ? 'selected' : '';
                tableHtml += `<option value="${attr}" ${selected}>${getAttributeLabel(attr)}</option>`;
            });
            tableHtml += '</select>';
            tableHtml += '</div>';
            tableHtml += '</div>';
            tableHtml += '<div class="top-functions-table">';
            tableHtml += '<table>';
            tableHtml += `<thead><tr><th>Function</th><th style="text-align: right;">Max ${attributeLabel}</th></tr></thead>`;
            tableHtml += '<tbody>';

            topFunctions.forEach(func => {
                const anchorId = `func-${func.name.replace(/[^a-zA-Z0-9]/g, '-')}`;
                tableHtml += `<tr>
                    <td class="function-name"><a href="#${anchorId}" onclick="document.getElementById('${anchorId}').scrollIntoView({ behavior: 'smooth', block: 'center' }); return false;">${escapeHtml(func.name)}</a></td>
                    <td class="runtime-value">${formatNumber(func.value)}</td>
                </tr>`;
            });

            tableHtml += '</tbody></table></div></div>';

            return tableHtml;
        }

        function showTooltip(element, costJson, event) {
            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';

            try {
                const cost = JSON.parse(costJson);
                let html = '<div class="tooltip-title">Cost Information</div>';

                if (cost.cost) {
                    html += `<div class="cost-item"><span class="cost-label">Runtime:</span> <span class="cost-value">${formatRange(cost.cost.min.runtime, cost.cost.max.runtime)}</span></div>`;
                    html += `<div class="cost-item"><span class="cost-label">Read Count:</span> <span class="cost-value">${formatRange(cost.cost.min.read_count, cost.cost.max.read_count)}</span></div>`;
                    html += `<div class="cost-item"><span class="cost-label">Read Length:</span> <span class="cost-value">${formatRange(cost.cost.min.read_length, cost.cost.max.read_length)}</span></div>`;
                    html += `<div class="cost-item"><span class="cost-label">Write Count:</span> <span class="cost-value">${formatRange(cost.cost.min.write_count, cost.cost.max.write_count)}</span></div>`;
                    html += `<div class="cost-item"><span class="cost-label">Write Length:</span> <span class="cost-value">${formatRange(cost.cost.min.write_length, cost.cost.max.write_length)}</span></div>`;
                }

                if (cost.trait_count) {
                    html += `<div class="cost-item" style="margin-top: 8px;"><span class="cost-label">Trait Count:</span> <span class="cost-value">${JSON.stringify(cost.trait_count)}</span></div>`;
                }

                tooltip.innerHTML = html;
            } catch (e) {
                tooltip.innerHTML = '<div class="tooltip-title">Cost Data</div><pre>' + escapeHtml(costJson) + '</pre>';
            }

            document.body.appendChild(tooltip);

            // Use mouse position from event, accounting for scroll position
            const mouseX = event.clientX + window.scrollX;
            const mouseY = event.clientY + window.scrollY;
            const tooltipRect = tooltip.getBoundingClientRect();

            // Position tooltip to the right of cursor with small offset
            let left = mouseX + 15;
            let top = mouseY - 10;

            // Adjust if tooltip goes off screen horizontally (viewport-relative)
            const viewportRight = window.innerWidth + window.scrollX - 10;
            if (left + tooltipRect.width > viewportRight) {
                // If it would go off right edge, position to the left of cursor instead
                left = mouseX - tooltipRect.width - 15;
            }
            const viewportLeft = window.scrollX + 10;
            if (left < viewportLeft) {
                left = viewportLeft;
            }

            // Adjust if tooltip goes off screen vertically (viewport-relative)
            const viewportBottom = window.innerHeight + window.scrollY - 10;
            if (top + tooltipRect.height > viewportBottom) {
                top = viewportBottom - tooltipRect.height;
            }
            const viewportTop = window.scrollY + 10;
            if (top < viewportTop) {
                top = viewportTop;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';

            return tooltip;
        }

        // Handle paste/input events for URL
        urlInput.addEventListener('paste', async (e) => {
            setTimeout(async () => {
                await processUrlInput();
            }, 50);
        });

        urlInput.addEventListener('blur', async () => {
            await processUrlInput();
        });

        // Handle paste/input events for source
        sourceInput.addEventListener('paste', async (e) => {
            setTimeout(async () => {
                await processSourceInput();
            }, 50);
        });

        sourceInput.addEventListener('blur', async () => {
            await processSourceInput();
        });

        async function processUrlInput() {
            const url = urlInput.value.trim();

            // Only post if URL is different from last one and not empty
            if (url && url !== lastPostedUrl && url.startsWith('http')) {
                lastPostedUrl = url;
                resultDiv.innerHTML = '<div class="loading">Loading...</div>';

                try {
                    const response = await fetch('/contract', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ url: url })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    await renderResult(data);
                } catch (error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                }
            }
        }

        async function processSourceInput() {
            const source = sourceInput.value.trim();

            // Only post if source is different from last one and not empty
            if (source && source !== lastPostedSource && source.length > 10) {
                lastPostedSource = source;
                resultDiv.innerHTML = '<div class="loading">Loading...</div>';

                try {
                    const response = await fetch('/contract-source', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ source: source })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    await renderResult(data);
                } catch (error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                }
            }
        }

        async function renderResult(data) {
            // Render the result
            const sourceCode = data.source_code || '';
            const costMap = data.cost_map || {};
            currentCostMap = costMap; // Store for dropdown updates

            resultDiv.innerHTML = `
                ${renderTopFunctionsTable(costMap, selectedFocusAttribute)}
                <div class="content-wrapper cost-map-hidden">
                    <div class="source-section">
                        <h2 class="section-title">Source Code</h2>
                        <div id="sourceCode">${renderSourceCode(sourceCode, costMap)}</div>
                    </div>
                    <div class="cost-section hidden">
                        <h2 class="section-title">Cost Map</h2>
                        <div id="costTree">${JSON.stringify(costMap, null, 2)}</div>
                    </div>
                    <div class="cost-map-toggle"></div>
                </div>
            `;

            // Setup top functions table event listeners
            function setupTopFunctionsListeners() {
                const topFunctionsHeader = resultDiv.querySelector('.top-functions-header');
                if (topFunctionsHeader) {
                    // Remove existing listeners by cloning
                    const newHeader = topFunctionsHeader.cloneNode(true);
                    topFunctionsHeader.parentNode.replaceChild(newHeader, topFunctionsHeader);

                    newHeader.addEventListener('click', (e) => {
                        // Don't toggle if clicking the dropdown
                        if (e.target.classList.contains('top-functions-focus-select')) {
                            return;
                        }
                        const isCollapsed = newHeader.classList.contains('collapsed');
                        const table = resultDiv.querySelector('.top-functions-table');
                        if (isCollapsed) {
                            newHeader.classList.remove('collapsed');
                            table.classList.remove('collapsed');
                        } else {
                            newHeader.classList.add('collapsed');
                            table.classList.add('collapsed');
                        }
                    });
                }

                const focusSelect = resultDiv.querySelector('#focusAttributeSelect');
                if (focusSelect) {
                    focusSelect.addEventListener('change', (e) => {
                        selectedFocusAttribute = e.target.value;
                        updateTopFunctionsTable();
                    });
                }
            }

            function updateTopFunctionsTable() {
                const topFunctionsContainer = resultDiv.querySelector('.top-functions');
                if (topFunctionsContainer) {
                    const wasCollapsed = resultDiv.querySelector('.top-functions-header').classList.contains('collapsed');
                    topFunctionsContainer.outerHTML = renderTopFunctionsTable(currentCostMap, selectedFocusAttribute);

                    const newHeader = resultDiv.querySelector('.top-functions-header');
                    const newTable = resultDiv.querySelector('.top-functions-table');
                    if (wasCollapsed && newHeader && newTable) {
                        newHeader.classList.add('collapsed');
                        newTable.classList.add('collapsed');
                    }

                    setupTopFunctionsListeners();
                }
            }

            setupTopFunctionsListeners();

            // Add cost map toggle handler
            const costMapToggle = resultDiv.querySelector('.cost-map-toggle');
            const costSection = resultDiv.querySelector('.cost-section');
            const contentWrapper = resultDiv.querySelector('.content-wrapper');
            if (costMapToggle && costSection && contentWrapper) {
                costMapToggle.addEventListener('click', () => {
                    const isHidden = costSection.classList.contains('hidden');
                    if (isHidden) {
                        costSection.classList.remove('hidden');
                        contentWrapper.classList.remove('cost-map-hidden');
                    } else {
                        costSection.classList.add('hidden');
                        contentWrapper.classList.add('cost-map-hidden');
                    }
                });
            }

            // Add hover event listeners
            const hoverables = resultDiv.querySelectorAll('.hoverable');
            let currentTooltip = null;

            hoverables.forEach(el => {
                el.addEventListener('mouseenter', (e) => {
                    if (currentTooltip) {
                        currentTooltip.remove();
                    }
                    const costJson = el.getAttribute('data-cost');
                    currentTooltip = showTooltip(el, costJson, e);
                });

                el.addEventListener('mousemove', (e) => {
                    if (currentTooltip) {
                        // Update tooltip position as mouse moves, accounting for scroll
                        const tooltipRect = currentTooltip.getBoundingClientRect();
                        const mouseX = e.clientX + window.scrollX;
                        const mouseY = e.clientY + window.scrollY;

                        let left = mouseX + 15;
                        let top = mouseY - 10;

                        // Adjust if tooltip goes off screen horizontally (viewport-relative)
                        const viewportRight = window.innerWidth + window.scrollX - 10;
                        if (left + tooltipRect.width > viewportRight) {
                            left = mouseX - tooltipRect.width - 15;
                        }
                        const viewportLeft = window.scrollX + 10;
                        if (left < viewportLeft) {
                            left = viewportLeft;
                        }

                        // Adjust if tooltip goes off screen vertically (viewport-relative)
                        const viewportBottom = window.innerHeight + window.scrollY - 10;
                        if (top + tooltipRect.height > viewportBottom) {
                            top = viewportBottom - tooltipRect.height;
                        }
                        const viewportTop = window.scrollY + 10;
                        if (top < viewportTop) {
                            top = viewportTop;
                        }

                        currentTooltip.style.left = left + 'px';
                        currentTooltip.style.top = top + 'px';
                    }
                });

                el.addEventListener('mouseleave', () => {
                    if (currentTooltip) {
                        currentTooltip.remove();
                        currentTooltip = null;
                    }
                });
            });
        }
    </script>
</body>
</html>
